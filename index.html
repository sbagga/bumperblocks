<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NumberBlocks Designer</title>

<!-- PixiJS v7 (WebGL) -->

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', 'Comic Sans MS', sans-serif;
    background: #333;
    min-height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  header {
    text-align: center;
    padding: 10px 20px;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(10px);
    border-bottom: 2px solid rgba(0,0,0,0.08);
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 100;
    position: relative;
  }

  header h1 {
    font-size: 28px;
    background: linear-gradient(90deg, #ff6b6b, #ffa500, #ffd93d, #6bcb77, #4d96ff, #9b59b6);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 900;
    letter-spacing: 2px;
  }

  .instructions {
    color: rgba(0,0,0,0.55);
    font-size: 13px;
  }

  .instructions span {
    display: inline-block;
    margin: 0 8px;
    padding: 2px 8px;
    background: rgba(0,0,0,0.06);
    border-radius: 4px;
    font-size: 12px;
    color: #3e6b3e;
  }

  .btn-clear {
    background: rgba(220,60,60,0.12);
    color: #c0392b;
    border: 1px solid rgba(220,60,60,0.25);
    padding: 6px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.2s;
  }
  .btn-clear:hover {
    background: rgba(220,60,60,0.25);
    color: #a93226;
  }

  .btn-wreck-mode {
    background: rgba(100,60,20,0.15);
    color: #6d4c1d;
    border: 1px solid rgba(100,60,20,0.3);
    padding: 6px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.2s;
    margin-right: 6px;
  }
  .btn-wreck-mode:hover { background: rgba(100,60,20,0.28); }
  .btn-wreck-mode.active {
    background: rgba(180,100,20,0.35);
    color: #fff;
    border-color: rgba(180,100,20,0.6);
    box-shadow: 0 0 8px rgba(180,100,20,0.4);
  }

  #gameContainer {
    position: relative;
    width: 100vw;
    height: calc(100vh - 58px);
    overflow: hidden;
    cursor: crosshair;
  }

  #gameContainer canvas {
    display: block;
  }

  #wreckBtn {
    display: none;
    position: absolute;
    z-index: 200;
    background: linear-gradient(135deg, #e74c3c, #c0392b);
    color: #fff;
    border: 2px solid #a93226;
    padding: 8px 22px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 1px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.3);
    transition: transform 0.15s;
  }
  #wreckBtn:hover { transform: scale(1.08); }
</style>
</head>
<body>

<header>
  <h1>NumberBlocks Designer</h1>
  <div class="instructions">
    <span>🖱️ Click to create</span>
    <span>✋ Drag to move</span>
    <span>🔗 Drop near to fuse</span>
    <span>🗑️ Right-click to delete</span>
  </div>
  <div style="display:flex;gap:6px;align-items:center">
    <button class="btn-wreck-mode" id="wreckModeBtn" onclick="toggleWreckMode()">🏗️ Wrecking Ball</button>
    <button class="btn-clear" onclick="clearAll()">Clear All</button>
  </div>
</header>

<div id="gameContainer">
  <button id="wreckBtn" onclick="releaseWreckingBall()">💥 WRECK!</button>
</div>

<!-- Game scripts — load order matters (see ARCHITECTURE.md) -->
<script src="js/config.js"></script>
<script src="js/constants.js"></script>
<script src="js/app.js"></script>
<script src="js/sound.js"></script>
<script src="js/sky.js"></script>
<script src="js/environment.js"></script>
<script src="js/blocks.js"></script>
<script src="js/wrecking.js"></script>
<script src="js/game-loop.js"></script>
</body>
</html>

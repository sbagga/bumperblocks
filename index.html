<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<!-- PixiJS v7 (WebGL) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.3/pixi.min.js"></script>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', 'Comic Sans MS', sans-serif;
    background: #333;
    min-height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  header {
    text-align: center;
    padding: 4px 12px;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(10px);
    border-bottom: 2px solid rgba(0,0,0,0.08);
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 100;
    position: relative;
    gap: 8px;
  }

  .logo-group {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  .logo-group img {
    width: 28px;
    height: 28px;
  }

  header h1 {
    font-size: 17px;
    background: linear-gradient(90deg, #e03030, #d47700, #c89500, #2a9d4e, #2266cc, #7b3fa0);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 900;
    letter-spacing: 1px;
    white-space: nowrap;
    filter: drop-shadow(0 1px 1px rgba(0,0,0,0.15));
  }

  .instructions {
    color: rgba(0,0,0,0.55);
    font-size: 11px;
  }

  .instructions span {
    display: inline-block;
    margin: 0 4px;
    padding: 1px 6px;
    background: rgba(0,0,0,0.06);
    border-radius: 4px;
    font-size: 11px;
    color: #3e6b3e;
  }

  .btn-clear {
    background: rgba(220,60,60,0.12);
    color: #c0392b;
    border: 1px solid rgba(220,60,60,0.25);
    padding: 3px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.2s;
  }
  .btn-clear:hover {
    background: rgba(220,60,60,0.25);
    color: #a93226;
  }

  .btn-wreck-mode {
    background: rgba(100,60,20,0.15);
    color: #6d4c1d;
    border: 1px solid rgba(100,60,20,0.3);
    padding: 3px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.2s;
    margin-right: 4px;
  }
  .btn-wreck-mode:hover { background: rgba(100,60,20,0.28); }
  .btn-wreck-mode.active {
    background: rgba(180,100,20,0.35);
    color: #fff;
    border-color: rgba(180,100,20,0.6);
    box-shadow: 0 0 8px rgba(180,100,20,0.4);
  }

  .difficulty-wrapper {
    display: flex;
    align-items: center;
    gap: 3px;
    font-size: 11px;
    color: #555;
  }
  .difficulty-wrapper label { font-weight: 600; white-space: nowrap; }
  #difficultySelect {
    background: rgba(80,40,120,0.12);
    color: #4a2d6e;
    border: 1px solid rgba(80,40,120,0.3);
    padding: 3px 6px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 11px;
    font-weight: 700;
    transition: all 0.2s;
  }
  #difficultySelect:hover { background: rgba(80,40,120,0.22); }

  #gameContainer {
    position: relative;
    width: 100vw;
    height: calc(100vh - 40px);
    overflow: hidden;
    cursor: crosshair;
  }

  #gameContainer canvas {
    display: block;
    touch-action: none;
  }

  #wreckBtn {
    display: none;
    position: absolute;
    z-index: 200;
    background: linear-gradient(135deg, #e74c3c, #c0392b);
    color: #fff;
    border: 2px solid #a93226;
    padding: 8px 22px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 1px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.3);
    transition: transform 0.15s;
  }
  #wreckBtn:hover { transform: scale(1.08); }
</style>
</head>
<body>

<header>
  <div class="logo-group">
    <img src="img/logo.svg" alt="Bumper Blocks">
    <h1>Bumper Blocks</h1>
  </div>
  <div class="instructions">
    <span>🖱️ Click to create</span>
    <span>✋ Drag to move</span>
    <span>🔗 Drop near to fuse</span>
    <span>🗑️ Right-click to delete</span>
  </div>
  <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
    <button class="btn-wreck-mode" id="wreckModeBtn" onclick="toggleWreckMode()">🏗️ Wrecking Ball</button>
    <button class="btn-wreck-mode" id="nightModeBtn" onclick="toggleNightMode()">🌙 Night Mode</button>
    <div class="difficulty-wrapper">
      <label for="difficultySelect">🧟 Difficulty:</label>
      <select id="difficultySelect" onchange="setZombieDifficulty(Number(this.value))">
        <option value="0">0 – Off</option>
        <option value="1">1 – Peaceful</option>
        <option value="2">2 – Very Easy</option>
        <option value="3" selected>3 – Easy</option>
        <option value="4">4 – Normal-</option>
        <option value="5">5 – Normal</option>
        <option value="6">6 – Hard-</option>
        <option value="7">7 – Hard</option>
        <option value="8">8 – Very Hard</option>
        <option value="9">9 – Extreme</option>
        <option value="10">10 – Nightmare</option>
      </select>
    </div>
    <button class="btn-clear" onclick="clearAll()">Clear All</button>
  </div>
</header>

<div id="gameContainer">
  <button id="wreckBtn" onclick="releaseWreckingBall()">💥 WRECK!</button>
</div>

<!-- Game scripts — load order matters (see ARCHITECTURE.md) -->
<script src="js/config.js"></script>
<script src="js/difficulty.config.js"></script>
<script src="js/constants.js"></script>
<script src="js/app.js"></script>
<script src="js/sound.js"></script>
<script src="js/sky.js"></script>
<script src="js/environment.js"></script>
<script src="js/blocks.js"></script>
<script src="js/zombies.js"></script>
<script src="js/wrecking.js"></script>
<script src="js/game-loop.js"></script>
</body>
</html>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.3/pixi.min.js"></script>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', 'Comic Sans MS', sans-serif;
    background: #333;
    min-height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  header {
    text-align: center;
    padding: 6px 14px;
    background: rgba(30,30,40,0.82);
    backdrop-filter: blur(12px);
    border-bottom: 2px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 100;
    position: relative;
    gap: 6px;
    flex-wrap: wrap;
  }

  .logo-group {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  .logo-group img {
    width: 28px;
    height: 28px;
  }

  header h1 {
    font-size: 19px;
    background: linear-gradient(90deg, #ff4444, #ff9922, #ffcc00, #44dd66, #44aaff, #bb66ee);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 900;
    letter-spacing: 1px;
    white-space: nowrap;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.4));
  }

  .instructions {
    color: rgba(255,255,255,0.7);
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 4px;
    flex-wrap: wrap;
  }

  .instructions span {
    display: inline-block;
    margin: 0;
    padding: 2px 8px;
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
    font-size: 13px;
    color: rgba(255,255,255,0.85);
    white-space: nowrap;
  }

  .instructions .hint-text {
    display: inline-block;
  }

  .header-controls {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
    flex-shrink: 0;
  }

  .btn-clear {
    background: rgba(255,80,80,0.25);
    color: #ff8888;
    border: 1px solid rgba(255,80,80,0.35);
    padding: 4px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
  }
  .btn-clear:hover {
    background: rgba(255,80,80,0.4);
    color: #ffaaaa;
  }

  .btn-wreck-mode {
    background: rgba(255,180,80,0.2);
    color: #ffcc88;
    border: 1px solid rgba(255,180,80,0.3);
    padding: 4px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
    margin-right: 4px;
  }
  .btn-wreck-mode:hover { background: rgba(255,180,80,0.35); }
  .btn-wreck-mode.active {
    background: rgba(180,100,20,0.35);
    color: #fff;
    border-color: rgba(180,100,20,0.6);
    box-shadow: 0 0 8px rgba(180,100,20,0.4);
  }

  .difficulty-wrapper {
    display: flex;
    align-items: center;
    gap: 3px;
    font-size: 13px;
    color: rgba(255,255,255,0.7);
  }
  .difficulty-wrapper label { font-weight: 600; white-space: nowrap; }
  #difficultySelect {
    background: rgba(160,100,220,0.25);
    color: #ccaaff;
    border: 1px solid rgba(160,100,220,0.4);
    padding: 3px 6px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 700;
    transition: all 0.2s;
  }
  #difficultySelect:hover { background: rgba(160,100,220,0.4); }

  #gameContainer {
    position: relative;
    width: 100vw;
    height: calc(100vh - 40px);
    overflow: hidden;
    cursor: crosshair;
  }

  /* ── Responsive ── */
  @media (max-width: 900px) {
    header { padding: 4px 10px; gap: 4px; }
    header h1 { font-size: 16px; }
    .logo-group img { width: 22px; height: 22px; }
    .instructions span { font-size: 11px; padding: 2px 5px; }
    .instructions .hint-text { display: none; }
    .btn-wreck-mode, .btn-clear { font-size: 11px; padding: 3px 8px; }
    .difficulty-wrapper { font-size: 11px; }
    #difficultySelect { font-size: 10px; }
  }

  @media (max-width: 600px) {
    header {
      flex-direction: column;
      align-items: stretch;
      padding: 6px 8px;
      gap: 4px;
    }
    .header-row-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }
    header h1 { font-size: 15px; letter-spacing: 0.5px; }
    .logo-group img { width: 20px; height: 20px; }
    .instructions {
      justify-content: center;
      gap: 3px;
    }
    .instructions span { font-size: 11px; padding: 1px 5px; }
    .instructions .hint-text { display: none; }
    .header-controls {
      justify-content: center;
      gap: 4px;
    }
    .btn-wreck-mode, .btn-clear { font-size: 11px; padding: 3px 7px; margin-right: 0; }
    .difficulty-wrapper label { font-size: 11px; }
    #difficultySelect { font-size: 10px; padding: 2px 4px; }
  }

  #gameContainer canvas {
    display: block;
    touch-action: none;
  }

  #wreckBtn {
    display: none;
    position: absolute;
    z-index: 200;
    background: linear-gradient(135deg, #e74c3c, #c0392b);
    color: #fff;
    border: 2px solid #a93226;
    padding: 8px 22px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 1px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.3);
    transition: transform 0.15s;
  }
  #wreckBtn:hover { transform: scale(1.08); }
</style>
</head>
<body>

<header>
  <div class="header-row-top">
    <div class="logo-group">
      <img src="img/logo.svg" alt="Bumper Blocks">
      <h1>Bumper Blocks</h1>
    </div>
    <div class="instructions">
      <span id="stageDisplay" style="font-weight:800;color:#88bbff">Stage 1</span>
      <span id="targetDisplay" style="font-weight:800;color:#ff8888">Target: 6</span>
      <span class="hint-text">✋ Drag to move</span>
      <span class="hint-text">🔗 Drop near to fuse</span>
      <span class="hint-text">👆👆 Double-click to split</span>
    </div>
  </div>
  <div class="header-controls">
    <button class="btn-wreck-mode" id="wreckModeBtn" onclick="toggleWreckMode()">🏗️ Wrecking Ball</button>
    <button class="btn-wreck-mode" id="nightModeBtn" onclick="toggleNightMode()">🌙 Night Mode</button>
    <div class="difficulty-wrapper">
      <label for="difficultySelect">🧟 Difficulty:</label>
      <select id="difficultySelect" onchange="setZombieDifficulty(Number(this.value))">
        <option value="0">0 – Off</option>
        <option value="1">1 – Peaceful</option>
        <option value="2">2 – Very Easy</option>
        <option value="3" selected>3 – Easy</option>
        <option value="4">4 – Normal-</option>
        <option value="5">5 – Normal</option>
        <option value="6">6 – Hard-</option>
        <option value="7">7 – Hard</option>
        <option value="8">8 – Very Hard</option>
        <option value="9">9 – Extreme</option>
        <option value="10">10 – Nightmare</option>
      </select>
    </div>
    <button class="btn-clear" onclick="restartStage()">🔄 Restart</button>
  </div>
</header>

<div id="gameContainer">
  <button id="wreckBtn" onclick="releaseWreckingBall()">💥 WRECK!</button>
</div>

<!-- Game scripts — load order matters (see ARCHITECTURE.md) -->
<script src="js/config.js"></script>
<script src="js/difficulty.config.js"></script>
<script src="js/constants.js"></script>
<script src="js/app.js"></script>
<script src="js/sound.js"></script>
<script src="js/sky.js"></script>
<script src="js/environment.js"></script>
<script src="js/blocks.js"></script>
<script src="js/zombies.js"></script>
<script src="js/wrecking.js"></script>
<script src="js/stages.js"></script>
<script src="js/game-loop.js"></script>
</body>
</html>

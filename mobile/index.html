<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#333333">
<title>Bumper Blocks — Mobile</title>

<!-- PixiJS v7 (WebGL) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.3/pixi.min.js"></script>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    touch-action: none;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
    overscroll-behavior: none;
  }

  body {
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #333;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
  }

  #gameContainer {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  #gameContainer canvas {
    display: block;
    touch-action: none;
  }

  /* ── Floating Action Buttons (FAB) ── */
  .fab-toolbar {
    position: fixed;
    bottom: env(safe-area-inset-bottom, 12px);
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    padding: 8px 14px;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-radius: 24px;
    z-index: 200;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    border: 1px solid rgba(255, 255, 255, 0.1);
    transition: opacity 0.3s, transform 0.3s;
  }

  .fab-toolbar.hidden {
    opacity: 0;
    transform: translateX(-50%) translateY(80px);
    pointer-events: none;
  }

  .fab-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
    position: relative;
  }

  .fab-btn:active {
    transform: scale(0.9);
  }

  .fab-btn.wreck {
    background: rgba(139, 90, 43, 0.8);
    color: #fff;
  }
  .fab-btn.wreck.active {
    background: rgba(230, 126, 34, 0.9);
    box-shadow: 0 0 12px rgba(230, 126, 34, 0.5);
  }

  .fab-btn.night {
    background: rgba(52, 73, 94, 0.8);
    color: #fff;
  }
  .fab-btn.night.active {
    background: rgba(44, 62, 80, 0.95);
    box-shadow: 0 0 12px rgba(52, 152, 219, 0.4);
  }

  .fab-btn.clear {
    background: rgba(192, 57, 43, 0.8);
    color: #fff;
  }

  .fab-btn.difficulty {
    background: rgba(100, 60, 120, 0.8);
    color: #fff;
    font-size: 15px;
    font-weight: 800;
  }

  /* ── Mini HUD (top) ── */
  .mobile-hud {
    position: fixed;
    top: env(safe-area-inset-top, 8px);
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    padding: 4px 12px;
    background: rgba(0, 0, 0, 0.35);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-radius: 16px;
    z-index: 200;
    font-size: 11px;
    color: rgba(255, 255, 255, 0.7);
    align-items: center;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .mobile-hud .logo-group {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .mobile-hud .logo-group img {
    width: 20px;
    height: 20px;
  }
  .mobile-hud h1 {
    font-size: 13px;
    background: linear-gradient(90deg, #e03030, #d47700, #c89500, #2a9d4e, #2266cc, #7b3fa0);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 900;
    white-space: nowrap;
  }

  .mobile-hud .hint {
    opacity: 0.6;
    font-size: 10px;
  }

  /* ── Wreck Button (context-specific) ── */
  #wreckBtn {
    display: none;
    position: fixed;
    z-index: 300;
    background: linear-gradient(135deg, #e74c3c, #c0392b);
    color: #fff;
    border: 2px solid #a93226;
    padding: 12px 28px;
    border-radius: 14px;
    cursor: pointer;
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 1px;
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.4);
    -webkit-tap-highlight-color: transparent;
  }
  #wreckBtn:active { transform: scale(0.95); }

  /* ── Difficulty Picker Modal ── */
  .difficulty-modal {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 500;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    align-items: center;
    justify-content: center;
  }
  .difficulty-modal.open {
    display: flex;
  }
  .difficulty-panel {
    background: rgba(30, 30, 40, 0.95);
    border-radius: 20px;
    padding: 20px;
    width: min(320px, 85vw);
    max-height: 80vh;
    overflow-y: auto;
    border: 1px solid rgba(255, 255, 255, 0.12);
    box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
  }
  .difficulty-panel h2 {
    color: #fff;
    font-size: 16px;
    text-align: center;
    margin-bottom: 12px;
  }
  .diff-option {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 10px;
    color: rgba(255, 255, 255, 0.8);
    font-size: 14px;
    cursor: pointer;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .diff-option:active,
  .diff-option.selected {
    background: rgba(100, 60, 120, 0.5);
  }
  .diff-option .diff-num {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(100, 60, 120, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 13px;
    flex-shrink: 0;
  }
  .diff-option.selected .diff-num {
    background: rgba(155, 89, 182, 0.8);
    color: #fff;
  }

  /* ── Onboarding Overlay ── */
  .onboarding-overlay {
    position: fixed;
    inset: 0;
    z-index: 600;
    background: rgba(0, 0, 0, 0.7);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    color: #fff;
    padding: 30px;
    text-align: center;
    opacity: 1;
    transition: opacity 0.5s;
  }
  .onboarding-overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }
  .onboarding-overlay h2 {
    font-size: 24px;
    background: linear-gradient(90deg, #e03030, #d47700, #c89500, #2a9d4e, #2266cc, #7b3fa0);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 900;
  }
  .onboarding-hints {
    display: flex;
    flex-direction: column;
    gap: 14px;
    font-size: 16px;
    color: rgba(255, 255, 255, 0.85);
  }
  .onboarding-hints .hint-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .onboarding-hints .hint-icon {
    font-size: 28px;
    width: 40px;
    text-align: center;
    flex-shrink: 0;
  }
  .onboarding-start {
    margin-top: 16px;
    padding: 14px 40px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, #2ecc71, #27ae60);
    color: #fff;
    font-size: 18px;
    font-weight: 800;
    cursor: pointer;
    letter-spacing: 1px;
    box-shadow: 0 4px 16px rgba(46, 204, 113, 0.4);
    -webkit-tap-highlight-color: transparent;
  }
  .onboarding-start:active { transform: scale(0.95); }
</style>
</head>
<body>

<!-- Game Canvas -->
<div id="gameContainer">
  <button id="wreckBtn" onclick="releaseWreckingBall()">💥 WRECK!</button>
</div>

<!-- Mini HUD (top) -->
<div class="mobile-hud" id="mobileHud">
  <div class="logo-group">
    <img src="../img/logo.svg" alt="BB">
    <h1>Bumper Blocks</h1>
  </div>
  <span id="stageDisplay" style="font-weight:800;color:#88bbff">Stage 1</span>
  <span id="targetDisplay" style="font-weight:800;color:#ff8888">Target: 6</span>
  <span class="hint" id="hudHint">Drag to fuse</span>
</div>

<!-- Floating Action Bar (bottom) -->
<div class="fab-toolbar" id="fabToolbar">
  <button class="fab-btn wreck" id="wreckModeBtn" onclick="toggleWreckMode()" title="Wrecking Ball">🏗️</button>
  <button class="fab-btn night" id="nightModeBtn" onclick="toggleNightMode()" title="Night Mode">🌙</button>
  <button class="fab-btn difficulty" id="difficultyBtn" onclick="openDifficultyPicker()" title="Difficulty">🧟</button>
  <button class="fab-btn clear" onclick="restartStage()" title="Restart Stage">🔄</button>
</div>

<!-- Difficulty Picker Modal -->
<div class="difficulty-modal" id="difficultyModal">
  <div class="difficulty-panel">
    <h2>🧟 Zombie Difficulty</h2>
    <div id="difficultyOptions"></div>
  </div>
</div>

<!-- Hidden select (needed by existing game code) -->
<select id="difficultySelect" style="display:none">
  <option value="0">0</option>
  <option value="1">1</option>
  <option value="2" selected>2</option>
  <option value="3">3</option>
  <option value="4">4</option>
  <option value="5">5</option>
  <option value="6">6</option>
  <option value="7">7</option>
  <option value="8">8</option>
  <option value="9">9</option>
  <option value="10">10</option>
</select>

<!-- Onboarding Overlay -->
<div class="onboarding-overlay" id="onboarding">
  <h2>Bumper Blocks</h2>
  <div class="onboarding-hints">
    <div class="hint-row"><span class="hint-icon">✋</span><span>Drag blocks to move them</span></div>
    <div class="hint-row"><span class="hint-icon">🔗</span><span>Drop near another to fuse</span></div>
    <div class="hint-row"><span class="hint-icon">👆👆</span><span>Double-tap a block to split it</span></div>
    <div class="hint-row"><span class="hint-icon">🎯</span><span>Fuse blocks to reach the target!</span></div>
  </div>
  <button class="onboarding-start" id="startBtn">LET'S PLAY!</button>
</div>

<!-- Game scripts — reused from parent directory (load order preserved) -->
<script src="../js/config.js"></script>
<script src="../js/difficulty.config.js"></script>
<script src="js/mobile-config.js"></script>
<script src="../js/constants.js"></script>
<script src="../js/app.js"></script>
<script src="../js/sound.js"></script>
<script src="../js/sky.js"></script>
<script src="../js/environment.js"></script>
<script src="../js/blocks.js"></script>
<script src="../js/zombies.js"></script>
<script src="../js/wrecking.js"></script>
<script src="../js/stages.js"></script>
<script src="../js/game-loop.js"></script>

<!-- Mobile-specific UI and initialization -->
<script src="js/mobile-ui.js"></script>
</body>
</html>
